<!DOCTYPE html>
<html>
  <head>
    <title>TakeItHome.com | Category</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/shared/takeitHome-header.css">
    <link rel="stylesheet" href="styles/shared/product-ui.css">
    <link rel="stylesheet" href="styles/pages/category.css">
  </head>
  <body>
    <div class="tih-header">
      <div class="tih-header-left-section">
        <a href="index.html" class="header-link brand-link">
          <div class="brand-logo">TakeItHome.com</div>
          <div class="brand-logo-mobile">TIH</div>
        </a>
      </div>

      <div class="tih-header-middle-section">
        <input class="search-bar" type="text" placeholder="Search">
        <button class="search-button">
          <img class="search-icon" src="images/icons/search-icon.png">
        </button>
      </div>

      <div class="tih-header-right-section">
        <a class="orders-link header-link" href="orders.html">
          <span class="returns-text">Your</span>
          <span class="orders-text">Orders</span>
        </a>

        <a class="cart-link header-link" href="checkout.html">
          <img class="cart-icon" src="images/icons/cart-icon.png">
          <div class="cart-quantity js-cart-quantity">0</div>
          <div class="cart-text">Cart</div>
        </a>
      </div>
    </div>

    <main class="category-main">
      <section class="category-hero">
        <h1 class="js-category-title">Category Deals</h1>
        <p>Handpicked products for this section. Take it home before it's gone!</p>
        <p class="category-count js-category-count"></p>
      </section>

      <section class="category-grid js-category-grid"></section>
    </main>

    <div class="toast js-toast">✅ Added to Cart!</div>

    <footer class="site-footer">
      <p>TakeItHome.com</p>
      <p class="footer-tagline">Take it home before it's gone!</p>
    </footer>

    <script type="module" src="scripts/category.js"></script>
  </body>
</html>
